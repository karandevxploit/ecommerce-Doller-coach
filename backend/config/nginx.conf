# INDUSTRIAL GRADE NGINX CONFIG FOR 10K+ CONCURRENT USERS
# Put this in /etc/nginx/nginx.conf

user nginx;
worker_processes auto; # One worker per CPU core
worker_rlimit_nofile 65535; # Handle massive socket count

events {
    worker_connections 20000; # Max connections per worker
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # PERFORMANCE BOOSTS
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000; # High keepalive for frontend spa
    types_hash_max_size 2048;
    server_tokens off; # Security: Hide version

    # GZIP COMPRESSION (Saves bandwidth, improves speed)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # UPSTREAM (Load Balancing)
    upstream backend_nodes {
        least_conn; # Smart balancing: send to least busy worker
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;
        server 127.0.0.1:8004;
        keepalive 64; # Keep connections to nodes alive
    }

    server {
        listen 80;
        server_name api.dollercoach.com;

        # SECURITY HEADERS
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # API PROXY
        location /api/ {
            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # TIMEOUTS
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # STATIC UPLOADS (Serve directly from Disc/CDN)
        location /uploads/ {
            alias /var/www/dollercoach/backend/uploads/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # DENY ACCESS TO SENSITIVE FILES
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}