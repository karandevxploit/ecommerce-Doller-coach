# ===============================
# NETWORK & SECURITY
# ===============================
bind 127.0.0.1
protected-mode yes
port 6379

# Use ACL instead of requirepass
user default off
user appuser on >STRONG_PASSWORD_HERE allcommands allkeys

# ===============================
# CONNECTIONS
# ===============================
tcp-backlog 511
timeout 300
tcp-keepalive 60

# OS limit match karna zaroori hai (ulimit -n)
maxclients 5000

# ===============================
# MEMORY MANAGEMENT
# ===============================
maxmemory 2gb

# IMPORTANT: Queue-safe hybrid policy
maxmemory-policy allkeys-lru

# ===============================
# PERSISTENCE (OPTIMIZED)
# ===============================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Disable RDB (avoid double IO pressure)
save ""

# AOF Rewrite Optimization
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb

# ===============================
# PERFORMANCE
# ===============================
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ===============================
# SLOW LOG + LATENCY
# ===============================
slowlog-log-slower-than 5000
slowlog-max-len 256

latency-monitor-threshold 100

# ===============================
# CLIENT SAFETY
# ===============================
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ===============================
# LUA SAFETY
# ===============================
lua-time-limit 3000

# ===============================
# LOGGING
# ===============================
loglevel notice
logfile /var/log/redis/redis-server.log

# ===============================
# DATABASES
# ===============================
databases 16

# ===============================
# MEMORY OPTIMIZATION
# ===============================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ===============================
# SECURITY HARDENING
# ===============================
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""

# ===============================
# DEFRAGMENTATION
# ===============================
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

