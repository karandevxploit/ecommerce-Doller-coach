# Production NGINX Configuration (Optimized for 10K+ Concurrent Users)
# Path: /etc/nginx/sites-available/ecommerce-backend

# High-Concurrency Tuning (Main Context)
# Ensure you set 'worker_processes auto;' and 'worker_rlimit_nofile 65535;' in /etc/nginx/nginx.conf

upstream backend_cluster {
    least_conn; # Optimization: Send requests to the server with the fewest active connections
    # PM2 Cluster Mode uses a single port (8001) for the internal load balancer
    server 127.0.0.1:8001;
    keepalive 128; # Keep connections alive to reduce handshake overhead
}

# Rate Limiting Zone: 50 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

# 1. HTTP to HTTPS Redirection
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com; # REPLACE WITH YOUR DOMAIN

    location / {
        return 301 https://$host$request_uri;
    }
    
    # Let's Encrypt Validation Path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# 2. HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com; # REPLACE WITH YOUR DOMAIN

    # SSL Certificates (Managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem; # UNCOMMENT AFTER CERTBOT
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem; # UNCOMMENT AFTER CERTBOT
    
    # Optimized SSL Parameters
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Timeouts & Buffers (Optimized for Real-time)
    client_max_body_size 10M;
    proxy_connect_timeout 90;
    proxy_send_timeout 90;
    proxy_read_timeout 90;
    proxy_buffers 32 4k;

    # Core API Proxy
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket Proxy (High-Performance Path)
    location /socket.io/ {
        proxy_pass http://backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Low-latency Tuning
        proxy_buffering off;
        proxy_cache_off;
        proxy_read_timeout 86400; # Prevent idle disconnects
    }

    # Static Assets (High-Caching)
    location /uploads/ {
        proxy_pass http://backend_cluster;
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }

    # Security: Deny sensitive files
    location ~ /\. { deny all; }
}
